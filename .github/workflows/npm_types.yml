on:
  workflow_call:
    inputs:
      node-version-file:
        description: "Path to the Node version file. Defaults to '.nvmrc'."
        default: .nvmrc
        type: string

jobs:
  types:
    name: "Check types"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check types
        run: npm run types
